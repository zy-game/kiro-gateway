<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiro Gateway - 管理后台</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🚀 Kiro Gateway</h2>
                <p class="version">v2.3</p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">仪表盘</span>
                </a>
                <a href="#" class="nav-item disabled">
                    <span class="nav-icon">🔌</span>
                    <span class="nav-text">渠道列表</span>
                    <span class="badge">即将推出</span>
                </a>
                <a href="#" class="nav-item" data-page="accounts">
                    <span class="nav-icon">👤</span>
                    <span class="nav-text">账号列表</span>
                </a>
                <a href="#" class="nav-item" data-page="tokens">
                    <span class="nav-icon">🔑</span>
                    <span class="nav-text">令牌列表</span>
                </a>
                <a href="#" class="nav-item" data-page="logs">
                    <span class="nav-icon">📝</span>
                    <span class="nav-text">请求日志</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <button class="btn-logout" onclick="logout()">
                    <span>🚪</span> 退出登录
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Dashboard Page -->
            <div id="page-dashboard" class="page active">
                <div class="page-header">
                    <h1>📊 仪表盘</h1>
                </div>
                <div class="page-body">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon">👤</div>
                            <div class="stat-info">
                                <div class="stat-label">账号总数</div>
                                <div class="stat-value" id="stat-accounts">0</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">🔑</div>
                            <div class="stat-info">
                                <div class="stat-label">令牌总数</div>
                                <div class="stat-value" id="stat-tokens">0</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">💳</div>
                            <div class="stat-info">
                                <div class="stat-label">总用量</div>
                                <div class="stat-value" id="stat-usage">0</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Charts -->
                    <div class="chart-container">
                        <h3>📈 每小时请求统计（最近24小时）</h3>
                        <canvas id="hourlyChart" height="80"></canvas>
                    </div>
                    
                    <div class="chart-container">
                        <h3>🔢 Token 使用统计（最近24小时）</h3>
                        <canvas id="tokenChart" height="80"></canvas>
                    </div>
                </div>
            </div>

            <!-- Accounts Page -->
            <div id="page-accounts" class="page">
                <div class="page-header">
                    <h1>👤 账号列表</h1>
                    <div class="page-actions">
                        <button class="btn-primary" onclick="showAddAccountModal()">➕ 添加账号</button>
                        <button class="btn-secondary" onclick="loadAccounts()">🔄 刷新</button>
                    </div>
                </div>
                <div class="page-body">
                    <div id="accountsList" class="data-list">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </div>

            <!-- Tokens Page -->
            <div id="page-tokens" class="page">
                <div class="page-header">
                    <h1>🔑 令牌列表</h1>
                    <div class="page-actions">
                        <button class="btn-primary" onclick="showGenerateTokenModal()">➕ 生成令牌</button>
                        <button class="btn-secondary" onclick="loadTokens()">🔄 刷新</button>
                    </div>
                </div>
                <div class="page-body">
                    <div id="tokensList" class="data-list">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </div>

            <!-- Logs Page -->
            <div id="page-logs" class="page">
                <div class="page-header">
                    <h1>📝 请求日志</h1>
                    <div class="page-actions">
                        <button class="btn-secondary" onclick="loadLogs()">🔄 刷新</button>
                    </div>
                </div>
                <div class="page-body">
                    <!-- Search Bar -->
                    <div class="search-bar">
                        <input type="text" id="searchModel" placeholder="搜索模型名称..." class="search-input">
                        <select id="searchStatus" class="search-select">
                            <option value="">全部状态</option>
                            <option value="success">成功</option>
                            <option value="error">失败</option>
                        </select>
                        <button class="btn-primary" onclick="searchLogs()">🔍 搜索</button>
                        <button class="btn-secondary" onclick="clearSearch()">清除</button>
                    </div>
                    
                    <!-- Logs Table -->
                    <div id="logsList" class="logs-container">
                        <div class="loading">加载中...</div>
                    </div>
                    
                    <!-- Pagination -->
                    <div id="logsPagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Account Modal -->
    <div id="accountModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="accountModalTitle">添加账号</h2>
                <span class="close" onclick="closeAccountModal()">&times;</span>
            </div>
            <form id="accountForm" onsubmit="saveAccount(event)">
                <input type="hidden" id="accountId" />
                
                <div class="form-group">
                    <label>类型:</label>
                    <select id="accountType" required>
                        <option value="kiro">Kiro</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>优先级 (数值越大优先级越高):</label>
                    <input type="number" id="accountPriority" value="0" required />
                </div>

                <div class="form-group">
                    <label>用量限制 (0 = 无限制):</label>
                    <input type="number" id="accountLimit" value="0" step="0.01" required />
                </div>

                <div class="form-group">
                    <label>配置 (JSON):</label>
                    <textarea id="accountConfig" rows="12" placeholder='{
  "accessToken": "...",
  "refreshToken": "...",
  "clientId": "...",
  "clientSecret": "...",
  "region": "us-east-1",
  "profileArn": "..."
}' required></textarea>
                </div>

                <div class="modal-actions">
                    <button type="submit" class="btn-primary">保存</button>
                    <button type="button" class="btn-secondary" onclick="closeAccountModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Generate Token Modal -->
    <div id="tokenModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>生成令牌</h2>
                <span class="close" onclick="closeTokenModal()">&times;</span>
            </div>
            <form id="tokenForm" onsubmit="generateToken(event)">
                <div class="form-group">
                    <label>名称:</label>
                    <input type="text" id="tokenName" placeholder="例如: 生产环境密钥" required />
                </div>

                <div class="modal-actions">
                    <button type="submit" class="btn-primary">生成</button>
                    <button type="button" class="btn-secondary" onclick="closeTokenModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add User Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>添加用户</h2>
                <span class="close" onclick="closeUserModal()">&times;</span>
            </div>
            <form id="userForm" onsubmit="addUser(event)">
                <div class="form-group">
                    <label>用户名:</label>
                    <input type="text" id="username" required />
                </div>

                <div class="form-group">
                    <label>密码:</label>
                    <input type="password" id="password" required />
                </div>

                <div class="modal-actions">
                    <button type="submit" class="btn-primary">添加</button>
                    <button type="button" class="btn-secondary" onclick="closeUserModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script src="/static/app.js"></script>
    <script src="/static/logs.js"></script>
</body>
</html>
